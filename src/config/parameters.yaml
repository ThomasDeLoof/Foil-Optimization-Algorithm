# =============================================================================
# parameters.yaml — Physical and geometric parameters of the foil system
# =============================================================================
# Contains all fixed parameters independent of the use case
# =============================================================================

# -----------------------------------------------------------------------------
# ACTIVE CASE
# Options: "wingfoil", "windsurf", "downwind", "pumping"
# -----------------------------------------------------------------------------
case: "wingfoil"


# -----------------------------------------------------------------------------
# PILOT + BOARD — system carried by the foil
# -----------------------------------------------------------------------------
# The handling target (ω_n) is defined per discipline in scenarios.yaml
# — all calibrated for a performant freeride foil.
# -----------------------------------------------------------------------------
pilot:
  mass_kg: 75
  gyration_radius_m: 0.30   # Gyration radius of the pilot+board+rig system
                            # (standing on the board → ~30 cm). Used for I_yy.
  trim_moment_tolerance_N_m: 25.0
                            # Residual moment that the pilot can compensate
                            # comfortably

board:
  mass_kg: 6              # Board (composite, standard size)


# -----------------------------------------------------------------------------
# PARAMETRIC SEARCH SPACES (NACA loop)
# -----------------------------------------------------------------------------
search_space:
  cambrures: [0, 1, 2]                    # 0=Symmetric, 1=Slightly cambered, 2=Cambered
  epaisseurs_root: [12, 15, 18]           # Root thickness (%) — from thin to thick
  angle_reflex: [0.0, 1.0, 2.0, 3.0]     # Reflex trailing edge (deg)
  N_starts: 1

alpha:
  bounds: [-2.0, 12.0]    # Physically realistic range before stall
  init: 3.0               # Reasonable starting point

# Kulfan parameterization
Kulfan:
  N_CST: 8          # Coefficients per surface (upper + lower)
  DELTA: 0.05       # Half-amplitude of bounds around reference values
  NACA_REF_NAME: "naca2412"  # Reference airfoil choice for initialization

# -----------------------------------------------------------------------------
# MAIN WING
# -----------------------------------------------------------------------------
wing:
  # NB: `wing_span_bounds` and `wing_root_chord_bounds` are defined PER SCENARIO
  # in scenarios.yaml — each discipline has a different industrial reference
  # geometry (BSC 890 vs Race 800 vs HA 1080 vs HA 1525).
  # `span_init` and `root_chord_init` below are global fallbacks;
  # the actual inits are also in scenarios.yaml (`wing_span_init`,
  # `wing_root_chord_init`).
  span_init: 0.89                   # Fallback: warm-start AXIS BSC 890
  root_chord_init: 0.170            # Fallback: 170 mm BSC 890

  tip_chord_ratio: 0.25             # tip = 0.25 × root (elegance + AR close to industrial)
                                    # 0.20 = very thin tip, 0.30 = stocky freeride

  twist_bounds: [-5.0, 2.0]         # Widened: optimizer was saturating at +1° (seeks some
                                    # positive twist on the tip side — slight washin).
  twist_init: -1.5

  calage_bounds: [-3.0, 5.0]        # Widened: optimizer was tending toward the lower bound -2°

  # Fixed geometry
  sweep_deg: 15.0                   # Moderate sweep — anti-weed
  anhedral_deg: 4.0                 # Roll stability without overly penalizing lift
  n_sections: 10

  # Physical takeoff limit
  cl_max_takeoff: 1.3               # Conservative for a cambered NACA (real ~1.4 max)

  # Construction: carbon shell + polystyrene core (core strength neglected)
  skin_thickness: 0.0015            # 1.5 mm — typical carbon skin on freeride wing

  # Mechanical limits — fatigue sizing.
  ultimate_stress_mpa: 400          # σ_ult design carbon-epoxy laminate (+ imperfections)
  fatigue_allowable_ratio: 0.40     # Usable fraction in cyclic loading (>10⁶ cycles)
                                    # → σ_admissible = 400 × 0.40 = 160 MPa
  load_peak_factor: 2.5             # Dynamic peak / static cruise load (n_g equiv.)
                                    #   2-3: typical maneuvering hydrofoil on chop
                                    #   4-5: rough conditions, vigorous pumping, shock


# -----------------------------------------------------------------------------
# FUSELAGE (common parameters; length bounds & init in scenarios.yaml)
# -----------------------------------------------------------------------------
fuselage:
  diameter: 0.035                   # 35 mm standard carbon tube diameter
  x_start: 0.10                     # Fuselage nose 10 cm behind wing LE
  n_sections: 6


# -----------------------------------------------------------------------------
# MAST (fixed parameters, the mast is not optimized)
# -----------------------------------------------------------------------------
mast:
  length: 0.82                      # 82 cm total (freeride standard)
  immersion_depth: 0.45
  chord_top: 0.135                  # Chord at top (waterline)
  chord_bot: 0.110                  # Chord at bottom (thinner for drag)
  profile: "naca0012"               # Thin profile (depending on machining feasibility and strength)

  x_position: 0.25                  # 25 cm behind wing LE (standard position)
  cd: 0.007                          # Cd consistent with thin profile at Re ~1.5e6

  n_sections: 4

# -----------------------------------------------------------------------------
# STABILIZER
# -----------------------------------------------------------------------------
stab:
  # NB: INITIAL stab values (warm-start) → scenarios.yaml per discipline.
  # BOUNDS below = global, kept narrow to avoid aberrant stabs.
  airfoil: "naca0012"               # Standard symmetric for incidence-set stab

  cl_alpha_per_deg: 0.10            # Stab CL_α slope (NACA 0012 thin sym, AR ~7-8).
                                    # Used to compute control authority
                                    # dF_stab/dα = CL_α × q × S_stab. Cf. scenarios.yaml
                                    # `stab_control_authority_min_N_per_deg`.

  span_bounds:       [0.25, 0.50]   # Freeride stab: typically 25-50 cm
  root_chord_bounds: [0.04, 0.12]   # 4-12 cm root
  tip_chord_ratio:   0.4           # tip = ratio × root

  twist_bounds: [-6.0, 0.0]
  twist_init: -2.5

  sweep_deg: 5.0
  dihedral_deg: 3.0
  n_sections: 5
  fuselage_offset: 0.10             # Stab LE setback from rear of fuselage (m)

  # Soft constraint to avoid aberrant stabs (AR too low/high)
  aspect_ratio_range: [5.0, 12.0]   # Industrial stab AR: typically 6-10
