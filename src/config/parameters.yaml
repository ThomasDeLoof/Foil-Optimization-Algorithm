# =============================================================================
# parameters.yaml — Paramètres physiques et géométriques du système foil
# =============================================================================
# Contient tous les paramètres fixes indépendants du cas d'usage
# =============================================================================

# -----------------------------------------------------------------------------
# CAS ACTIF
# Options : "wingfoil", "windsurf", "downwind", "pumping"
# -----------------------------------------------------------------------------
case: "wingfoil"


# -----------------------------------------------------------------------------
# PILOTE + PLANCHE — système porté par le foil
# -----------------------------------------------------------------------------
# La cible de pilotabilité (ω_n) est définie par discipline dans scenarios.yaml
# — toutes calibrées pour un foil performant freeride.
# -----------------------------------------------------------------------------
pilot:
  mass_kg: 75
  gyration_radius_m: 0.30   # Rayon de giration du système pilote+board+rig
                            # (debout sur planche → ~30 cm). Utilisé pour I_yy.
  trim_moment_tolerance_N_m: 25.0
                            # Moment résiduel que le pilote peut compenser
                            # confortablement 

board:
  mass_kg: 6              # Planche (composite, taille standard)


# -----------------------------------------------------------------------------
# ESPACES DE RECHERCHE PARAMÉTRIQUE (boucle NACA)
# -----------------------------------------------------------------------------
search_space:
  cambrures: [0, 1, 2]                    # 0=Symétrique, 1=Légèrement cambré, 2=Cambré
  epaisseurs_root: [12, 15, 18]           # Épaisseur emplanture (%) — du mince au épais
  angle_reflex: [0.0, 1.0, 2.0, 3.0]     # Reflex trailing edge (deg)
  N_starts: 1

alpha:
  bounds: [-2.0, 12.0]    # Plage physiquement réaliste avant décrochage
  init: 3.0               # Point de départ raisonnable

# Paramétrage Kulfan
Kulfan:
  N_CST: 8          # Coefficients par surface (extrados + intrados)
  DELTA: 0.05       # Demi-amplitude des bornes autour des valeurs de référence
  NACA_REF_NAME: "naca2412"  # Choix du profil de référence pour l'initialisation

# -----------------------------------------------------------------------------
# AILE PRINCIPALE
# -----------------------------------------------------------------------------
wing:
  # NB : `wing_span_bounds` et `wing_root_chord_bounds` sont définis PAR SCÉNARIO
  # dans scenarios.yaml — chaque discipline a une géométrie de référence
  # industrielle différente (BSC 890 vs Race 800 vs HA 1080 vs HA 1525).
  # `span_init` et `root_chord_init` ci-dessous sont des fallbacks globaux ;
  # les inits réels sont aussi dans scenarios.yaml (`wing_span_init`,
  # `wing_root_chord_init`).
  span_init: 0.89                   # Fallback : warm-start AXIS BSC 890
  root_chord_init: 0.170            # Fallback : 170 mm BSC 890

  tip_chord_ratio: 0.25             # tip = 0.25 × root (élégance + AR proche industriel)
                                    # 0.20 = saumon très fin, 0.30 = trapu freeride

  twist_bounds: [-5.0, 2.0]         # Élargi : opti saturait à +1° (recherche un peu de
                                    # vrillage positif côté saumon — washin léger).
  twist_init: -1.5

  calage_bounds: [-3.0, 5.0]        # Élargi : opti tendait vers la borne basse -2°

  # Géométrie fixe
  sweep_deg: 15.0                   # Flèche modérée — anti-algues
  anhedral_deg: 4.0                 # Stabilité en roulis sans trop pénaliser la portance
  n_sections: 10

  # Limite physique décollage
  cl_max_takeoff: 1.3               # Conservateur pour un NACA cambré (réel ~1.4 max)

  # Construction : coque carbone + âme polystyrène (résistance âme négligée)
  skin_thickness: 0.0015            # 1.5 mm — peau carbone typique sur aile freeride

  # Limites mécaniques — dimensionnement fatigue.
  ultimate_stress_mpa: 400          # σ_ult design carbone-époxy stratifié (+ imperfections)
  fatigue_allowable_ratio: 0.40     # Fraction utilisable en cyclique (>10⁶ cycles)
                                    # → σ_admissible = 400 × 0.40 = 160 MPa
  load_peak_factor: 2.5             # Pic dynamique / charge statique cruise (n_g équiv.)
                                    #   2-3 : maneuvering hydrofoil typique sur clapot
                                    #   4-5 : conditions agitées, pumping vigoureux, choc


# -----------------------------------------------------------------------------
# FUSELAGE (paramètres communs ; bornes & init de longueur dans scenarios.yaml)
# -----------------------------------------------------------------------------
fuselage:
  diameter: 0.035                   # 35 mm diamètre standard tube carbone
  x_start: 0.10                     # Nez fuselage à 10 cm derrière le BA aile
  n_sections: 6


# -----------------------------------------------------------------------------
# MÂT (paramètres fixes, le mât n'est pas optimisé)
# -----------------------------------------------------------------------------
mast:
  length: 0.82                      # 82 cm total (standard freeride)
  immersion_depth: 0.45
  chord_top: 0.135                  # Corde en haut (ligne de flottaison)
  chord_bot: 0.110                  # Corde en bas (plus fin pour la traînée)
  profile: "naca0012"               # Profil mince (à voir possibilités d'usinage et solidité)
                                    
  x_position: 0.25                  # 25 cm derrière le BA aile (position standard)
  cd: 0.007                          # Cd cohérent avec profil mince à Re ~1.5e6
                      
  n_sections: 4

# -----------------------------------------------------------------------------
# STABILISATEUR
# -----------------------------------------------------------------------------
stab:
  # NB : valeurs INITIALES du stab (warm-start) → scenarios.yaml par discipline.
  # BORNES ci-dessous = globales, gardées étroites pour éviter stabs aberrants.
  airfoil: "naca0012"               # Symétrique standard pour stab calé

  cl_alpha_per_deg: 0.10            # Pente CL_α du stab (NACA 0012 thin sym, AR ~7-8).
                                    # Utilisé pour calculer l'autorité de contrôle
                                    # dF_stab/dα = CL_α × q × S_stab. Cf. scenarios.yaml
                                    # `stab_control_authority_min_N_per_deg`.

  span_bounds:       [0.25, 0.50]   # Stab freeride : 25-50 cm typique
  root_chord_bounds: [0.04, 0.12]   # 4-12 cm root
  tip_chord_ratio:   0.4           # tip = ratio × root

  twist_bounds: [-6.0, 0.0]
  twist_init: -2.5

  sweep_deg: 5.0
  dihedral_deg: 3.0
  n_sections: 5
  fuselage_offset: 0.10             # Recul du BA stab par rapport à l'arrière du fuselage (m)

  # Soft constraint pour éviter les stabs aberrants (AR trop bas/haut)
  aspect_ratio_range: [5.0, 12.0]   # AR de stab industriel : 6-10 typique
