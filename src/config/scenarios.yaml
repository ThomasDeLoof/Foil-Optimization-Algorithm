# =============================================================================
# scenarios.yaml — Contraintes aérodynamiques par discipline
# =============================================================================
#   - Toutes les disciplines visent un foil "performant freeride" : polyvalent,
#     accessible, calibré sur les modèles industriels de référence.
#   - Pas de subdivision par niveau pilote : une seule plage ω_n par discipline.
# =============================================================================


# -----------------------------------------------------------------------------
# WINGFOIL FREERIDE
# Référence : AXIS BSC 890 (1290 cm², AR 6.43)
# -----------------------------------------------------------------------------
wingfoil:
  v_takeoff: 5.5            # m/s — décollage freeride accessible (9.7 kts)
  v_cruise: 9.5             # m/s — croisière confortable (~17.5 kts)

  # Marge décollage : fraction de CL_max utilisée au takeoff.
  takeoff_cl_margin: 0.55

  # Pilotabilité — ω_n cible (Hz) pour un foil freeride équilibré.
  pilotability_freq: [2.2, 3.0]

  stab_load_range:          # Force stab cruise (N, négatif = déportance).
    - -70.0                 # Borne haute = autorité dynamique : à cruise le stab
    - -20.0                 # DOIT produire ≥ 20 N de download, pour garder ~50 %
                            # de réserve en CL_stab pour les transitoires (vagues,
                            # rafales, corrections pilote). Sans ça l'opti glisse
                            # vers un stab minimum qui ne tient qu'en steady-state.

  cg_range:                 # Garde-fou numérique seulement — la pilotabilité
    - 0.05                  # réelle est imposée par la cible ω_n, pas par CG.
    - 0.65                  # Bornes très larges → CG choisi via moment + ω_n.

  cg_ratio_init: 0.38

  fuselage_length_bounds:   # Bras stab — wingfoil freeride
    - 0.65                  #   borne basse : moment cambré SD7062 demande de l'arm
    - 0.95
  fuselage_length_init: 0.75

  rig_mass_kg: 3            # Wing léger (3-4 kg typique)

  # Foil de référence : AXIS BSC 890 (1290 cm², AR 6.43, max chord 170 mm)
  # Stab compagnon : AXIS Skinny 365/55 (168 cm², AR 8.06)
  wing_airfoil:         "naca2412"
  # Prendre des profils cambré à au moins 4 %, NACA 4412, 4415, Eppler 387, HQ17, SD7037

  wing_span_init:       0.890
  wing_root_chord_init: 0.170
  wing_span_bounds:       [0.85, 1.20]   # Freeride wingfoil — calé BSC 890 (89 cm)
  wing_root_chord_bounds: [0.13, 0.25]   # 130-250 mm. Sweet spot trouvé par itérations.
  stab_span:       0.365
  stab_root_chord: 0.055


# -----------------------------------------------------------------------------
# WINDSURF FREERIDE
# -----------------------------------------------------------------------------
windsurf:
  v_takeoff: 7.0            # m/s — décollage nécessite plus de vitesse (~13.6 kts)
  v_cruise: 13.0            # m/s — croisière freeride windsurf (~25,27 kts)

  # Windsurf race-freeride : on tolère de s'approcher plus du CL_max au takeoff
  # (rider expérimenté + vitesse plus haute = takeoff plus "engagé").
  takeoff_cl_margin: 0.70

  # Windsurf race-freeride : foil plus réactif que wingfoil (q haut à 13 m/s).
  pilotability_freq: [2.8, 3.8]

  stab_load_range:          # Déportance plus forte pour contrer le moment du gréement.
    - -80.0                 # Borne haute serrée à -25 N : windsurf race demande
    - -25.0                 # une grosse autorité de correction pour absorber les
                            # rafales et clapot à 13 m/s.

  cg_range:                 # Garde-fou numérique — pilotabilité via ω_n.
    - 0.05
    - 0.65

  cg_ratio_init: 0.30

  fuselage_length_bounds:   # Bras stab — windsurf race-freeride
    - 0.70                  #   long pour stabilité directionnelle haute vitesse
    - 1.00
  fuselage_length_init: 0.85

  rig_mass_kg: 9            # Voile + mât + wishbone

  # Foil de référence : Starboard Race 800 (800 cm², AR 8.0, span 800 mm)
  # Stab compagnon : Starboard Tail 255 (255 cm², span 400 mm, AR 6.3)
  wing_airfoil:         "naca2412"
  # Profils entre 2 et 3% de cambrure, NACA 2410, 2412, HT13

  wing_span_init:       0.800
  wing_root_chord_init: 0.120
  wing_span_bounds:       [0.75, 1.10]   # Race-freeride windsurf — calé Race 800 (80 cm)
  wing_root_chord_bounds: [0.10, 0.20]   # 100-200 mm. Race wing : chord modéré.
  stab_span:       0.400
  stab_root_chord: 0.076


# -----------------------------------------------------------------------------
# DOWNWIND FREERIDE
# -----------------------------------------------------------------------------
downwind:
  v_takeoff: 6.0            # m/s — nécessite une petite poussée initiale
  v_cruise: 10.0            # m/s — vitesse typique downwind freeride (~ 20 kts)

  # Downwind = glisse sur houle, foil grand pour stabilité → marge généreuse
  takeoff_cl_margin: 0.55

  # Downwind = glisse longue sur houle : foil "doux à pomper", plage modérée.
  pilotability_freq: [1.8, 2.5]

  stab_load_range:          # Quasi neutre — pas de déportance qui freine la glisse,
    - -30.0                 # mais ≥ 3 N de download pour absorber le swell sans
    - -3.0                  # que le stab change de signe sur les bosses.

  cg_range:                 # Garde-fou numérique — pilotabilité via ω_n.
    - 0.05
    - 0.65

  cg_ratio_init: 0.23

  fuselage_length_bounds:   # Bras stab — downwind freeride
    - 0.60                  #   intermédiaire entre pumping et wingfoil
    - 0.90
  fuselage_length_init: 0.75

  rig_mass_kg: 0

  # Foil de référence : Armstrong HA 1080 (1080 cm², AR 9.6, span 1020 mm)
  #   High-aspect — surf/downwind/wing intermediate-to-expert
  # Stab compagnon : Armstrong HA 195 (195 cm², span 385 mm, AR 7.6)
  wing_airfoil:         "e387"
  # profils thin laminar pour glisse longue, E387, E186, NACA 2412, HQ17
  wing_span_init:       1.020
  wing_root_chord_init: 0.128
  wing_span_bounds:       [0.95, 1.25]   # Downwind high-aspect — calé HA 1080 (102 cm)
  wing_root_chord_bounds: [0.11, 0.22]   # 110-220 mm. High-aspect glider.
  stab_span:       0.385
  stab_root_chord: 0.060


# -----------------------------------------------------------------------------
# PUMPING FREERIDE
# -----------------------------------------------------------------------------
pumping:
  v_takeoff: 3.5            # m/s — décollage à très basse vitesse (~6 kts)
  v_cruise: 6.0             # m/s — vitesse de croisière pompage (~12kts)

  # Pumping = takeoff à 3.5 m/s, on ALLE le CL_max — le foil doit donner tout
  # ce qu'il a au décollage. Pas de marge → foil naturellement gros.
  takeoff_cl_margin: 0.85

  # Pumping = cycles d'effort à très basse vitesse. ω_n basse : le foil doit
  # "porter le pilote", pas demander des micro-corrections rapides.
  pilotability_freq: [1.3, 1.9]

  stab_load_range:          # Quasi nul — le stab ne doit pas freiner le pumping,
    - -20.0                 # mais ≥ 2 N de download pour garder un sens d'équilibre
    - -2.0                  # pendant les cycles d'effort (sinon le rider "perd" le foil).

  cg_range:                 # Garde-fou numérique — pilotabilité via ω_n.
    - 0.05
    - 0.65

  cg_ratio_init: 0.25

  fuselage_length_bounds:   # Bras stab — pumping freeride
    - 0.45                  #   court pour réactivité / agilité en pumping
    - 0.75
  fuselage_length_init: 0.60

  rig_mass_kg: 0            # Aucun gréement

  # Foil de référence : Armstrong HA 1525 (1525 cm², AR 9.5, span 1200 mm)
  #   High-aspect pumping wing, intermediate-to-expert flatwater riders
  # Stab compagnon : Armstrong HA 195 (idem downwind, kit officiel HA1525 + HA195)
  wing_airfoil:         "e423"
  # profils à fort camber pour CL_max à basse vitesse, e423, E817, SD7062, NACA 4412
  wing_span_init:       1.200
  wing_root_chord_init: 0.154
  wing_span_bounds:       [1.05, 1.35]   # Pumping low-V/large area — calé HA 1525 (120 cm)
  wing_root_chord_bounds: [0.13, 0.25]   # 130-250 mm. Foil naturellement grand.
  stab_span:       0.385
  stab_root_chord: 0.060