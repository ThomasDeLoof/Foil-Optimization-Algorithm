# =============================================================================
# scenarios.yaml — Contraintes aérodynamiques par discipline
# =============================================================================
#   - Contraintes larges = l'optimiseur explore librement
#   - Orientation freeride dans tous les cas (pas de vitesse pure)
# =============================================================================


# -----------------------------------------------------------------------------
# WINGFOIL FREERIDE
# Référence : AFS Enduro 1100 (1100 cm², finesse ~15, SM 50-70%)
# -----------------------------------------------------------------------------
wingfoil:
  v_takeoff: 5.5            # m/s — décollage freeride accessible (9.7 kts)
  v_cruise: 9.5             # m/s — croisière confortable (~17.5 kts)

  area_target_range:    
    - 0.080              
    - 0.130               

  stab_area_range:       
    - 0.013             
    - 0.026          

  sm_range:                 # NB : SM aircraft-style avec CG modélisé dans la corde
    - 0.40                  # de l'aile. Réelle SM physique (pilote au-dessus du mât)
    - 0.85                  # est très différente — voir notes dans optFixedProfileV2.py

  stab_load_range:          # Force stab (N, négatif = déportance)
    - -45.0
    - -5.0

  cg_range:                 # Position CG / corde moyenne (relâché : 0.45 saturait)
    - 0.30                  # avant : pilotage précis
    - 0.50                  # arrière : limite raisonnable (au-delà, F_stab explose)

  cg_ratio_init: 0.38

  vh_range:                 # Relâché : 0.85 saturait à l'opti précédente
    - 0.30
    - 1.10

  rig_mass_kg: 3            # Wing léger (3-4 kg typique)

  # Foil de référence : AXIS BSC 890 (1290 cm², AR 6.43, max chord 170 mm)
  # Stab compagnon : AXIS Skinny 365/55 (168 cm², AR 8.06)
  wing_airfoil:         "sd7062"   # ou naca4412 — profil cambré modéré
  wing_span_init:       0.890
  wing_root_chord_init: 0.170
  wing_tip_chord_init:  0.053
  stab_span:       0.365
  stab_root_chord: 0.055
  stab_tip_chord:  0.013


# -----------------------------------------------------------------------------
# WINDSURF FREERIDE
# -----------------------------------------------------------------------------
windsurf:
  v_takeoff: 7.0            # m/s — décollage nécessite plus de vitesse (~13.6 kts)
  v_cruise: 13.0            # m/s — croisière freeride windsurf (~25,27 kts)

  area_target_range:        # Aile race-freeride : 550-950 cm² 
    - 0.07
    - 0.11

  stab_area_range:
    - 0.018                 
    - 0.032                 

  sm_range:                 # SM aircraft-style avec CG dans la corde (cf. wingfoil)
    - 0.50                  # gamme cohérente avec cg_range et X_np typique ~96%
    - 0.80

  stab_load_range:          # Déportance plus forte pour contrer le moment du gréement
    - -40.0
    - -8.0

  cg_range:
    - 0.20                  # Centrage plus avancé qu'en wingfoil (pied avant sur planche)
    - 0.42

  cg_ratio_init: 0.30

  vh_range:                 # Fuselage long nécessaire pour la stabilité directionnelle
    - 0.40
    - 1.00

  rig_mass_kg: 9            # Voile + mât + wishbone

  # Foil de référence : Starboard Race 800 (800 cm², AR 8.0, span 800 mm)
  #   Profil Tom Speer "thin and relatively symmetrical" — race iconique IQFoil
  # Stab compagnon : Starboard Tail 255 (255 cm², span 400 mm, AR 6.3)
  wing_airfoil:         "naca1410"   # thin + low camber, conforme au design Speer
  wing_span_init:       0.800
  wing_root_chord_init: 0.120
  wing_tip_chord_init:  0.025
  stab_span:       0.400
  stab_root_chord: 0.076
  stab_tip_chord:  0.020


# -----------------------------------------------------------------------------
# DOWNWIND FREERIDE
# -----------------------------------------------------------------------------
downwind:
  v_takeoff: 6.0            # m/s — nécessite une petite poussée initiale
  v_cruise: 10.0            # m/s — vitesse typique downwind freeride (~ 20 kts)

  area_target_range:
    - 0.080                 
    - 0.115                 

  stab_area_range:
    - 0.014                 
    - 0.024                 

  sm_range:                 # Foil downwind = high AR, CG très avancé → SM élevé
    - 0.65                  # gamme cohérente avec cg_range [0.18, 0.30]
    - 0.85

  stab_load_range:          # Quasi neutre — pas de déportance qui freine la glisse
    - -15.0
    - -1.0

  cg_range:
    - 0.18                  # Très avancé — pieds vers l'avant sur la board
    - 0.30

  cg_ratio_init: 0.23

  vh_range:                 # Fuselage court pour la maniabilité en virage
    - 0.25
    - 0.55

  rig_mass_kg: 0

  # Foil de référence : Armstrong HA 1080 (1080 cm², AR 9.6, span 1020 mm)
  #   High-aspect — surf/downwind/wing intermediate-to-expert
  # Stab compagnon : Armstrong HA 195 (195 cm², span 385 mm, AR 7.6)
  wing_airfoil:         "e387"   # Eppler 387, thin laminar pour glisse longue
  wing_span_init:       1.020
  wing_root_chord_init: 0.128
  wing_tip_chord_init:  0.025
  stab_span:       0.385
  stab_root_chord: 0.060
  stab_tip_chord:  0.015


# -----------------------------------------------------------------------------
# PUMPING FREERIDE
# -----------------------------------------------------------------------------
pumping:
  v_takeoff: 3.5            # m/s — décollage à très basse vitesse (~6 kts)
  v_cruise: 6.0             # m/s — vitesse de croisière pompage (~12kts)

  area_target_range:        
    - 0.120            
    - 0.180                

  stab_area_range:
    - 0.016                 
    - 0.028                

  sm_range:                 # Pumping = grosse aile, CG avancé, SM moyennement haut
    - 0.60                  # gamme cohérente avec cg_range [0.20, 0.32]
    - 0.80

  stab_load_range:          # Quasi nul — le stab ne doit pas freiner le mouvement
    - -10.0
    - -0.5

  cg_range:
    - 0.20
    - 0.32

  cg_ratio_init: 0.25

  vh_range:                 # Fuselage très court pour l'efficacité du pompage
    - 0.20
    - 0.50

  rig_mass_kg: 0            # Aucun gréement

  # Foil de référence : Armstrong HA 1525 (1525 cm², AR 9.5, span 1200 mm)
  #   High-aspect pumping wing, intermediate-to-expert flatwater riders
  # Stab compagnon : Armstrong HA 195 (idem downwind, kit officiel HA1525 + HA195)
  wing_airfoil:         "e423"   # Eppler 423, fort camber pour CL_max à basse vitesse
  wing_span_init:       1.200
  wing_root_chord_init: 0.154
  wing_tip_chord_init:  0.030
  stab_span:       0.385
  stab_root_chord: 0.060
  stab_tip_chord:  0.015