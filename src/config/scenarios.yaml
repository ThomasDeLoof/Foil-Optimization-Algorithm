# =============================================================================
# scenarios.yaml — Contraintes aérodynamiques par discipline
# =============================================================================
#   - Contraintes larges = l'optimiseur explore librement
#   - Orientation freeride dans tous les cas (pas de vitesse pure)
# =============================================================================


# -----------------------------------------------------------------------------
# WINGFOIL FREERIDE
# Référence : AFS Enduro 1100 (1100 cm², finesse ~15, SM 50-70%)
# -----------------------------------------------------------------------------
wingfoil:
  v_takeoff: 5.5            # m/s — décollage freeride accessible (9.7 kts)
  v_cruise: 9.5             # m/s — croisière confortable (~17.5 kts)

  area_target_range:    
    - 0.085              
    - 0.130               

  stab_area_range:       
    - 0.013             
    - 0.026          

  sm_range:              
    - 0.14                  
    - 0.30                  

  stab_load_range:          # Force stab (N, négatif = déportance)
    - -45.0               
    - -5.0                

  cg_range:                 # Position CG / corde moyenne
    - 0.28                  # avant : pilotage précis
    - 0.60                  # arrière : confort et stabilité

  cg_ratio_init: 0.40       

  vh_range:                
    - 0.30                 
    - 0.85                

  rig_mass_kg: 3            # Wing léger (3-4 kg typique)


# -----------------------------------------------------------------------------
# WINDSURF FREERIDE
# -----------------------------------------------------------------------------
windsurf:
  v_takeoff: 7.0            # m/s — décollage nécessite plus de vitesse (~13.6 kts)
  v_cruise: 13.0            # m/s — croisière freeride windsurf (~25,27 kts)

  area_target_range:
    - 0.070               
    - 0.120              

  stab_area_range:
    - 0.018                 
    - 0.032                 

  sm_range:              
    - 0.25                  # min : 25% (encore maniable en windsurf)
    - 0.55                  # max : 55% (stable sans être figé)

  stab_load_range:          # Déportance plus forte pour contrer le moment du gréement
    - -40.0
    - -8.0

  cg_range:
    - 0.20                  # Centrage plus avancé qu'en wingfoil (pied avant sur planche)
    - 0.42

  cg_ratio_init: 0.30

  vh_range:                 # Fuselage long nécessaire pour la stabilité directionnelle
    - 0.40
    - 1.00

  rig_mass_kg: 9            # Voile + mât + wishbone


# -----------------------------------------------------------------------------
# DOWNWIND FREERIDE
# -----------------------------------------------------------------------------
downwind:
  v_takeoff: 6.0            # m/s — nécessite une petite poussée initiale
  v_cruise: 10.0            # m/s — vitesse typique downwind freeride (~ 20 kts)

  area_target_range:
    - 0.080                 
    - 0.115                 

  stab_area_range:
    - 0.014                 
    - 0.024                 

  sm_range:                 # Réactif 
    - 0.08                  
    - 0.20              

  stab_load_range:          # Quasi neutre — pas de déportance qui freine la glisse
    - -15.0
    - -1.0

  cg_range:
    - 0.18                  # Très avancé — pieds vers l'avant sur la board
    - 0.30

  cg_ratio_init: 0.23

  vh_range:                 # Fuselage court pour la maniabilité en virage
    - 0.25
    - 0.55

  rig_mass_kg: 0           


# -----------------------------------------------------------------------------
# PUMPING FREERIDE
# -----------------------------------------------------------------------------
pumping:
  v_takeoff: 3.5            # m/s — décollage à très basse vitesse (~6 kts)
  v_cruise: 6.0             # m/s — vitesse de croisière pompage (~12kts)

  area_target_range:        
    - 0.120            
    - 0.180                

  stab_area_range:
    - 0.016                 
    - 0.028                

  sm_range:                 # Très réactif 
    - 0.04                  # min : 4%
    - 0.12                  # max : 12% (au-delà, le pompage devient inefficace)

  stab_load_range:          # Quasi nul — le stab ne doit pas freiner le mouvement
    - -10.0
    - -0.5

  cg_range:
    - 0.20
    - 0.32

  cg_ratio_init: 0.25

  vh_range:                 # Fuselage très court pour l'efficacité du pompage
    - 0.20
    - 0.50

  rig_mass_kg: 0            # Aucun gréement